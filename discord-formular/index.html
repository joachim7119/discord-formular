<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formular</title>

  <style>
    body {
      font-family: Arial;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1f2937;
      padding: 30px;
      border-radius: 12px;
      width: 300px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
    }

    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }
  </style>
</head>

<body>

  <div class="box">
    <h2>Nachricht senden</h2>

    <input id="feld1" placeholder="Erstes Feld">
    <input id="feld2" placeholder="Zweites Feld">

    <button onclick="senden()">Senden</button>
  </div>

  <script>
    async function senden() {
      const feld1 = document.getElementById("feld1").value;
      const feld2 = document.getElementById("feld2").value;

      const response = await fetch("/api/send", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          feld1,
          feld2
        })
      });

      if (response.ok) {
        alert("Gesendet!");
      } else {
        alert("Fehler!");
      }
    }
  </script>

</body>
</html>
